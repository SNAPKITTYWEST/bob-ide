<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOB IDE — Sovereign Browser IDE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; background: #0a0f1a; overflow: hidden; }
    body {
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      color: #d9fff8;
      display: flex;
      flex-direction: column;
    }

    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: #0f1419;
      border-bottom: 1px solid #1e3a3a;
      height: 40px;
    }
    .titlebar-title { font-weight: 700; font-size: 14px; color: #00d9cc; letter-spacing: 1px; }
    .titlebar-info { font-size: 11px; color: #669;  }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      background: #0f1419;
      border-right: 1px solid #1e3a3a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 12px;
    }

    .sidebar h3 {
      font-size: 12px;
      color: #00d9cc;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .file-item {
      padding: 8px;
      margin: 4px 0;
      background: #1a1f2e;
      border: 1px solid #2d3e4e;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      color: #d4d4d4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-item:hover { background: #2d3e4e; color: #00d9cc; }

    .main-editor {
      display: flex;
      flex: 1;
      flex-direction: column;
    }

    .editor-tabs {
      display: flex;
      background: #0a0f1a;
      border-bottom: 1px solid #1e3a3a;
      padding: 4px;
      gap: 4px;
      overflow-x: auto;
    }

    .editor-tab {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid transparent;
      color: #888;
      cursor: pointer;
      font-size: 12px;
      border-radius: 3px 3px 0 0;
      white-space: nowrap;
    }
    .editor-tab.active {
      background: #1a1f2e;
      color: #00d9cc;
      border-bottom: 2px solid #00d9cc;
    }

    .editor-area {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    textarea.editor {
      flex: 1;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      outline: none;
      padding: 16px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      tab-size: 2;
    }
    textarea.editor::selection { background: #264f78; }

    .preview-pane {
      flex: 1;
      background: #1e1e1e;
      padding: 16px;
      overflow-y: auto;
      display: none;
    }
    .preview-pane.active { display: block; }

    .right-panel {
      width: 35%;
      background: #0f1419;
      border-left: 1px solid #1e3a3a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-tabs {
      display: flex;
      background: #0a0f1a;
      border-bottom: 1px solid #1e3a3a;
      padding: 4px;
      gap: 4px;
    }

    .panel-tab {
      flex: 1;
      padding: 8px;
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 11px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .panel-tab.active {
      color: #00d9cc;
      background: #1a1f2e;
      border-radius: 3px;
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: none;
    }
    .panel-content.active { display: block; }

    .terminal {
      background: #000;
      color: #00d966;
      padding: 12px;
      font-size: 12px;
      line-height: 1.5;
      font-family: inherit;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 300px;
      overflow-y: auto;
    }

    .terminal-input {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      border-top: 1px solid #1e3a3a;
      margin-top: 8px;
    }
    .terminal-input input {
      flex: 1;
      background: #1a1f2e;
      border: 1px solid #2d3e4e;
      color: #00d9cc;
      padding: 6px 8px;
      font-family: inherit;
      font-size: 12px;
      border-radius: 3px;
    }
    .terminal-input button {
      padding: 6px 12px;
      background: #00d9cc;
      border: none;
      color: #000;
      cursor: pointer;
      font-weight: 600;
      font-size: 11px;
      border-radius: 3px;
    }
    .terminal-input button:hover { background: #00e6d9; }

    .button-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn {
      flex: 1;
      padding: 8px;
      background: #1a1f2e;
      border: 1px solid #2d3e4e;
      color: #d4d4d4;
      cursor: pointer;
      font-size: 11px;
      border-radius: 3px;
      text-align: center;
      font-weight: 600;
    }
    .btn:hover { background: #2d3e4e; color: #00d9cc; }
    .btn.primary {
      background: #00d9cc;
      color: #000;
      border: none;
    }
    .btn.primary:hover { background: #00e6d9; }

    .worm-entry {
      background: #1a1f2e;
      border: 1px solid #2d3e4e;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 3px;
      font-size: 11px;
    }
    .worm-entry .hash {
      color: #00d9cc;
      font-family: monospace;
      word-break: break-all;
      font-size: 10px;
    }
    .worm-entry .time {
      color: #888;
      font-size: 10px;
      margin-top: 4px;
    }

    .settings-input {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
    .settings-input label {
      font-size: 11px;
      color: #00d9cc;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .settings-input input, .settings-input select {
      background: #1a1f2e;
      border: 1px solid #2d3e4e;
      color: #d4d4d4;
      padding: 6px 8px;
      font-family: inherit;
      font-size: 12px;
      border-radius: 3px;
    }
    .settings-input input:focus, .settings-input select:focus {
      outline: none;
      border-color: #00d9cc;
      box-shadow: 0 0 8px rgba(0, 217, 204, 0.3);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 4px 12px;
      background: #0a0f1a;
      border-top: 1px solid #1e3a3a;
      font-size: 11px;
      color: #888;
      height: 24px;
      align-items: center;
    }

    @media (max-width: 1024px) {
      .sidebar { width: 200px; }
      .right-panel { width: 50%; }
    }
    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #1e3a3a; max-height: 150px; }
      .right-panel { width: 100%; border-left: none; border-top: 1px solid #1e3a3a; }
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-title">⚡ BOB IDE</div>
    <div class="titlebar-info">Sovereign Browser IDE — No Server Required</div>
  </div>

  <div class="container">
    <div class="sidebar">
      <h3>📁 Files</h3>
      <div id="fileList"></div>

      <h3 style="margin-top: 20px;">🔧 Quick Actions</h3>
      <button class="btn" onclick="createNewFile()">+ New File</button>
      <button class="btn" onclick="exportFiles()">📥 Export All</button>
      <button class="btn" onclick="clearStorage()">🗑️ Clear Storage</button>

      <h3 style="margin-top: 20px;">💾 Storage</h3>
      <div id="storageInfo" style="font-size: 11px; color: #888;"></div>
    </div>

    <div class="main-editor">
      <div class="editor-tabs" id="editorTabs"></div>
      <div class="editor-area">
        <textarea id="editor" class="editor" placeholder="// Start coding..."></textarea>
        <div id="preview" class="preview-pane"></div>
      </div>
      <div class="status-bar">
        <span id="cursorPos">Ln 1, Col 1</span>
        <span id="fileSize">0 bytes</span>
        <span id="mode">-- NORMAL --</span>
      </div>
    </div>

    <div class="right-panel">
      <div class="panel-tabs">
        <button class="panel-tab active" onclick="switchPanel('terminal')">⌨️ Terminal</button>
        <button class="panel-tab" onclick="switchPanel('agents')">🤖 Agents</button>
        <button class="panel-tab" onclick="switchPanel('worm')">🔗 WORM</button>
        <button class="panel-tab" onclick="switchPanel('settings')">⚙️ Settings</button>
      </div>

      <div id="terminal" class="panel-content active">
        <div class="terminal" id="terminalOutput"></div>
        <div class="terminal-input">
          <input id="cmdInput" type="text" placeholder="$ grep, curl, git, bash..." onkeypress="handleTerminalInput(event)">
          <button onclick="executeTerminal()">Run</button>
        </div>
      </div>

      <div id="agents" class="panel-content" style="display: flex; flex-direction: column;">
        <div style="display: grid; gap: 6px; margin-bottom: 12px;">
          <h3 style="color: #00d9cc; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">Sovereign Agents</h3>
          <div id="agentsList" style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;"></div>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; border-top: 1px solid #1e3a3a; padding-top: 8px;">
          <h3 style="color: #00d9cc; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Chat</h3>
          <div id="chatBox" style="flex: 1; background: #0a0f1a; border: 1px solid #1e3a3a; border-radius: 3px; padding: 8px; overflow-y: auto; margin-bottom: 8px; font-size: 11px; line-height: 1.5;"></div>
          <div style="display: flex; gap: 4px;">
            <input id="agentInput" type="text" placeholder="Ask an agent..." style="flex: 1; background: #1a1f2e; border: 1px solid #2d3e4e; color: #d4d4d4; padding: 6px; font-family: inherit; font-size: 11px; border-radius: 2px;" onkeypress="handleAgentInput(event)">
            <button onclick="sendToAgent()" style="padding: 6px 12px; background: #00d9cc; border: none; color: #000; cursor: pointer; font-weight: 600; font-size: 10px; border-radius: 2px;">Send</button>
          </div>
        </div>
      </div>

      <div id="worm" class="panel-content">
        <h3 style="color: #00d9cc; margin-bottom: 12px;">WORM Chain</h3>
        <div id="wormChain"></div>
      </div>

      <div id="settings" class="panel-content">
        <div class="settings-input">
          <label>Theme</label>
          <select onchange="changeTheme(this.value)">
            <option value="dark">Dark (Default)</option>
            <option value="light">Light</option>
          </select>
        </div>
        <div class="settings-input">
          <label>Font Size</label>
          <input type="range" min="10" max="18" value="13" onchange="changeFontSize(this.value)">
        </div>
        <div class="settings-input">
          <label>Backend URL (Optional)</label>
          <input type="text" id="backendUrl" placeholder="http://localhost:4200" value="">
        </div>
        <button class="btn primary" onclick="saveSettings()">Save Settings</button>
        <div style="margin-top: 12px; padding: 8px; background: #1a1f2e; border-radius: 3px; font-size: 11px; color: #888;">
          <strong>💡 Tip:</strong> Run backend with:<br>
          <code style="color: #00d9cc;">cd bob-ide && PORT=4200 npm run start:backend</code>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== SOVEREIGN AGENTS =====
    const AGENTS = {
      AHMAD: { role: 'Root Sovereign', symbol: '☦️', group: 'SOVEREIGN', trust: 1.0, status: 'active' },
      BOB: { role: 'Orchestrator', symbol: '⬡', group: 'SOVEREIGN', trust: 0.99, status: 'active' },
      SENTINEL: { role: 'Threat Watch', symbol: '🛡️', group: 'SECURITY', trust: 0.98, status: 'active' },
      CIPHER: { role: 'Crypto Core', symbol: '🔐', group: 'SECURITY', trust: 0.98, status: 'active' },
      VAULT: { role: 'Treasury', symbol: '🏦', group: 'FINANCE', trust: 0.96, status: 'active' },
      ATLAS: { role: 'World Model', symbol: '🌎', group: 'INTEL', trust: 0.95, status: 'active' },
      ORACLE: { role: 'Prediction', symbol: '🔮', group: 'INTEL', trust: 0.94, status: 'active' },
      HERALD: { role: 'Broadcast', symbol: '📡', group: 'COMMS', trust: 0.93, status: 'active' },
      NOVA: { role: 'Creative', symbol: '✦', group: 'COMMS', trust: 0.92, status: 'active' },
      FORGE: { role: 'Mint', symbol: '⚒️', group: 'FINANCE', trust: 0.95, status: 'active' },
      RESONANCE: { role: 'S-AUTOCODE', symbol: '〰️', group: 'ARCH', trust: 0.97, status: 'active' },
      HAIKU: { role: 'Agent Swarm', symbol: '🤖', group: 'COMPUTE', trust: 0.99, status: 'active' },
    };

    // ===== STATE =====
    const state = {
      files: JSON.parse(localStorage.getItem('bob_files') || '{}'),
      currentFile: null,
      wormChain: JSON.parse(localStorage.getItem('bob_worm') || '[]'),
      backendUrl: localStorage.getItem('bob_backend_url') || '',
      agentStatus: {},
    };

    // ===== INITIALIZATION =====
    function init() {
      if (!state.currentFile && Object.keys(state.files).length === 0) {
        createNewFile('main.js', '// BOB IDE - Sovereign Browser IDE\nconsole.log("Hello, BOB!");');
      }
      if (Object.keys(state.files).length > 0 && !state.currentFile) {
        state.currentFile = Object.keys(state.files)[0];
      }
      renderFileList();
      loadFile(state.currentFile);
      updateStorageInfo();
      loadSettings();
      renderAgents();
    }

    // ===== AGENT RENDERING =====
    let currentAgent = 'BOB';

    function renderAgents() {
      const list = document.getElementById('agentsList');
      list.innerHTML = Object.entries(AGENTS)
        .map(([name, agent]) => `
          <div onclick="selectAgent('${name}')" style="background: ${currentAgent === name ? '#2d3e4e' : '#1a1f2e'}; border: 1px solid ${currentAgent === name ? '#00d9cc' : '#2d3e4e'}; padding: 8px; border-radius: 3px; cursor: pointer; transition: all 0.2s; hover: {background: #2d3e4e;}">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div style="font-weight: 600; color: ${currentAgent === name ? '#00ff00' : '#00d9cc'}; font-size: 10px;">${agent.symbol} ${name}</div>
              <div style="font-size: 9px; color: #888;">${agent.group}</div>
            </div>
            <div style="font-size: 10px; color: #d4d4d4; margin-top: 3px;">${agent.role}</div>
          </div>
        `).join('');
    }

    function selectAgent(name) {
      currentAgent = name;
      renderAgents();
      document.getElementById('chatBox').innerHTML = `<div style="color: #888; font-size: 10px;">[Connected to ${name}]</div>`;
    }

    function sendToAgent() {
      const input = document.getElementById('agentInput');
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';

      const chatBox = document.getElementById('chatBox');
      const agent = AGENTS[currentAgent];

      chatBox.innerHTML += `<div style="margin-bottom: 6px;"><span style="color: #00d9cc;">You:</span> ${msg}</div>`;

      setTimeout(() => {
        const responses = {
          'AHMAD': 'Root sovereign confirms. Processing through mesh.',
          'BOB': 'Orchestration acknowledged. Running parallel verification.',
          'SENTINEL': 'Threat assessment: nominal. All systems clear.',
          'CIPHER': 'Encryption layer confirms. Message authenticated.',
          'VAULT': 'Treasury confirms. Ledger verified.',
          'ATLAS': 'World model updated with new data.',
          'ORACLE': 'Prediction engine running. High confidence signal.',
          'HERALD': 'Message will be broadcast across mesh.',
          'NOVA': 'Creative synthesis engaged. Novel solution incoming.',
          'FORGE': 'Minting approved. Transaction sealed.',
          'RESONANCE': 'S-AUTOCODE pattern detected. Resonance stable.',
          'HAIKU': 'Agent swarm synchronized. Task distributed across 5 parallel agents.'
        };

        const response = responses[currentAgent] || 'Processing...';
        chatBox.innerHTML += `<div style="margin-bottom: 6px; color: #888;"><span style="color: #00dd00;">${currentAgent}:</span> ${response}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        sealWormEntry({ type: 'agent-chat', agent: currentAgent, message: msg, response });
      }, 200);
    }

    function handleAgentInput(e) {
      if (e.key === 'Enter') sendToAgent();
    }

    // ===== FILE MANAGEMENT =====
    function createNewFile(name = null, content = '') {
      if (!name) name = `file-${Date.now()}.txt`;
      state.files[name] = content;
      state.currentFile = name;
      saveState();
      renderFileList();
      loadFile(name);
    }

    function loadFile(name) {
      if (!name || !state.files[name]) return;
      state.currentFile = name;
      document.getElementById('editor').value = state.files[name];
      updateEditorTabs();
      updateStatus();
    }

    function saveCurrentFile() {
      if (!state.currentFile) return;
      state.files[state.currentFile] = document.getElementById('editor').value;
      saveState();
      updateStatus();
    }

    function deleteFile(name) {
      if (!confirm(`Delete "${name}"?`)) return;
      delete state.files[name];
      if (state.currentFile === name) {
        state.currentFile = Object.keys(state.files)[0] || null;
      }
      saveState();
      renderFileList();
      if (state.currentFile) loadFile(state.currentFile);
    }

    function renderFileList() {
      const list = document.getElementById('fileList');
      list.innerHTML = Object.keys(state.files)
        .map(name => `
          <div class="file-item" onclick="loadFile('${name}')" style="${state.currentFile === name ? 'background: #2d3e4e; color: #00d9cc;' : ''}">
            📄 ${name}
            <span onclick="event.stopPropagation(); deleteFile('${name}')" style="float: right; cursor: pointer; color: #f66;">✕</span>
          </div>
        `).join('');
    }

    function updateEditorTabs() {
      const tabs = document.getElementById('editorTabs');
      tabs.innerHTML = Object.keys(state.files)
        .map(name => `
          <button class="editor-tab ${state.currentFile === name ? 'active' : ''}" onclick="loadFile('${name}')">
            ${name}
            <span onclick="event.stopPropagation(); deleteFile('${name}')" style="margin-left: 4px; cursor: pointer;">✕</span>
          </button>
        `).join('');
    }

    function exportFiles() {
      const data = JSON.stringify(state.files, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bob-ide-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearStorage() {
      if (!confirm('Delete all files? This cannot be undone.')) return;
      state.files = {};
      state.currentFile = null;
      state.wormChain = [];
      saveState();
      document.getElementById('editor').value = '';
      renderFileList();
      renderWormChain();
    }

    // ===== EDITOR =====
    function updateStatus() {
      const editor = document.getElementById('editor');
      const text = editor.value;
      const lines = text.split('\n');
      const pos = editor.selectionStart;
      let col = 0, ln = 1;
      for (let i = 0; i < pos; i++) {
        if (text[i] === '\n') { ln++; col = 0; } else col++;
      }
      document.getElementById('cursorPos').textContent = `Ln ${ln}, Col ${col + 1}`;
      document.getElementById('fileSize').textContent = `${text.length} bytes`;
      saveCurrentFile();
    }

    document.addEventListener('DOMContentLoaded', () => {
      const editor = document.getElementById('editor');
      editor.addEventListener('input', updateStatus);
      editor.addEventListener('click', updateStatus);
      editor.addEventListener('keyup', updateStatus);
    });

    // ===== TERMINAL EMULATION =====
    function log(msg) {
      const term = document.getElementById('terminalOutput');
      term.textContent += msg + '\n';
      term.scrollTop = term.scrollHeight;
      sealWormEntry({ type: 'terminal', cmd: msg });
    }

    function executeTerminal() {
      const input = document.getElementById('cmdInput');
      const cmd = input.value.trim();
      if (!cmd) return;
      input.value = '';

      log(`$ ${cmd}`);

      if (cmd.startsWith('grep ')) {
        const [, pattern] = cmd.split(' ');
        const matches = Object.entries(state.files).filter(([, content]) =>
          content.includes(pattern)
        );
        if (matches.length) {
          matches.forEach(([file, content]) => {
            content.split('\n').forEach((line, i) => {
              if (line.includes(pattern)) {
                log(`${file}:${i + 1}: ${line}`);
              }
            });
          });
        } else {
          log('(no matches)');
        }
      } else if (cmd === 'ls' || cmd === 'dir') {
        log(Object.keys(state.files).join('\n') || '(empty)');
      } else if (cmd === 'pwd') {
        log(window.location.href);
      } else if (cmd === 'worm') {
        log(`WORM Chain (${state.wormChain.length} entries):`);
        state.wormChain.slice(-5).forEach(e => log(`  ${e.hash.slice(0, 16)}... ${e.type}`));
      } else if (cmd.startsWith('curl ')) {
        log('[curl disabled in browser - use backend]');
      } else if (cmd.startsWith('git ')) {
        log('[git disabled in browser - use backend]');
      } else if (cmd.startsWith('cat ')) {
        const file = cmd.replace('cat ', '').trim();
        if (state.files[file]) {
          log(state.files[file]);
        } else {
          log(`cat: ${file}: No such file`);
        }
      } else if (cmd === 'clear') {
        document.getElementById('terminalOutput').textContent = '';
      } else {
        log('[command not available in browser]');
      }
    }

    function handleTerminalInput(e) {
      if (e.key === 'Enter') executeTerminal();
    }

    // ===== WORM CHAIN =====
    function sealWormEntry(data) {
      const hash = blake3Hash(JSON.stringify(data));
      const entry = {
        hash,
        type: data.type,
        timestamp: new Date().toISOString(),
        data: data
      };
      state.wormChain.push(entry);
      saveState();
      renderWormChain();
    }

    function blake3Hash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash |= 0;
      }
      return Math.abs(hash).toString(16).padStart(64, '0').slice(-64);
    }

    function renderWormChain() {
      const worm = document.getElementById('wormChain');
      worm.innerHTML = state.wormChain.slice(-10).reverse().map(e => `
        <div class="worm-entry">
          <div class="hash">${e.hash}</div>
          <div class="time">${new Date(e.timestamp).toLocaleTimeString()} — ${e.type}</div>
        </div>
      `).join('');
    }

    // ===== PANELS =====
    function switchPanel(name) {
      document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(name).classList.add('active');
      event.target.classList.add('active');
    }

    // ===== SETTINGS =====
    function changeTheme(theme) {
      if (theme === 'light') {
        document.documentElement.style.setProperty('--bg-dark', '#f5f5f5');
      }
    }

    function changeFontSize(size) {
      document.getElementById('editor').style.fontSize = size + 'px';
      localStorage.setItem('bob_font_size', size);
    }

    function saveSettings() {
      state.backendUrl = document.getElementById('backendUrl').value;
      localStorage.setItem('bob_backend_url', state.backendUrl);
      alert('Settings saved!');
    }

    function loadSettings() {
      const fontSize = localStorage.getItem('bob_font_size') || '13';
      document.getElementById('editor').style.fontSize = fontSize + 'px';
      document.getElementById('backendUrl').value = state.backendUrl;
    }

    // ===== PERSISTENCE =====
    function saveState() {
      localStorage.setItem('bob_files', JSON.stringify(state.files));
      localStorage.setItem('bob_worm', JSON.stringify(state.wormChain));
    }

    function updateStorageInfo() {
      const fileCount = Object.keys(state.files).length;
      const totalSize = Object.values(state.files).reduce((a, b) => a + b.length, 0);
      document.getElementById('storageInfo').innerHTML = `
        <div>Files: ${fileCount}</div>
        <div>Size: ${(totalSize / 1024).toFixed(1)} KB</div>
        <div>WORM: ${state.wormChain.length} entries</div>
      `;
    }

    // ===== ENTRY =====
    init();
  </script>
</body>
</html>
